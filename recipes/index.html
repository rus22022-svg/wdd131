<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecipeBook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 64 64" aria-hidden="true">
          <rect
            x="10"
            y="8"
            width="40"
            height="48"
            rx="2"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
          />
          <line
            x1="18"
            y1="8"
            x2="18"
            y2="56"
            stroke="currentColor"
            stroke-width="3"
          />
          <path
            d="M50 14 L58 12 L58 50 L50 52"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linejoin="round"
          />
          <path
            d="M26 24 a6 6 0 0 1 12 0 a5 5 0 0 1 4 5 v3 h-20 v-3 a5 5 0 0 1 4 -5 z"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          />
          <line
            x1="24"
            y1="36"
            x2="40"
            y2="36"
            stroke="currentColor"
            stroke-width="2.5"
          />
          <line
            x1="24"
            y1="41"
            x2="40"
            y2="41"
            stroke="currentColor"
            stroke-width="2.5"
          />
        </svg>
        <h1 class="logo-text">RecipeBook</h1>
      </div>
    </header>

    <main>
      <form class="search" role="search" onsubmit="return false;">
        <label class="visually-hidden" for="search-input">Find a recipe</label>
        <input id="search-input" type="search" placeholder="Find a recipe" />
        <button type="submit" aria-label="Search">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle
              cx="10.5"
              cy="10.5"
              r="7"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
            />
            <line
              x1="15.5"
              y1="15.5"
              x2="21"
              y2="21"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </form>

      <article class="recipe-card">
        <img
          class="recipe-img"
          src="images/apple-crisp.jpg"
          alt="Bowl of apple crisp topped with a scoop of vanilla ice cream"
        />
        <div class="recipe-body">
          <p class="tag">dessert</p>
          <h2 class="recipe-title">Apple Crisp</h2>
          <div class="rating" role="img" aria-label="Rated 4 out of 5 stars">
            <span class="star filled">★</span>
            <span class="star filled">★</span>
            <span class="star filled">★</span>
            <span class="star filled">★</span>
            <span class="star">☆</span>
          </div>
          <p class="recipe-desc">
            This apple crisp recipe is a simple yet delicious fall dessert
            that's great served warm with vanilla ice cream.
          </p>
        </div>
      </article>
    </main>

    <footer class="site-footer">
      <p class="attribution">
        <a
          href="https://www.flaticon.com/free-icons/recipe-book"
          target="_blank"
          rel="noopener"
          >Recipe icons created by Freepik - Flaticon</a
        >
      </p>
      <ul class="socials">
        <li>
          <a href="#" aria-label="Instagram">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect
                x="3"
                y="3"
                width="18"
                height="18"
                rx="5"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              />
              <circle
                cx="12"
                cy="12"
                r="4"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              />
              <circle cx="17.5" cy="6.5" r="1.3" fill="currentColor" />
            </svg>
          </a>
        </li>
        <li>
          <a href="#" aria-label="YouTube">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect
                x="2"
                y="5"
                width="20"
                height="14"
                rx="4"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              />
              <polygon points="10,9 16,12 10,15" fill="currentColor" />
            </svg>
          </a>
        </li>
        <li>
          <a href="#" aria-label="Pinterest">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect
                x="3"
                y="3"
                width="18"
                height="18"
                rx="4"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              />
              <path
                d="M12 7 a3.5 3.5 0 0 1 1 6.8 c-1 .3-2-.2-2.2-1 M11.2 11.5 L9.8 18"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
          </a>
        </li>
      </ul>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
