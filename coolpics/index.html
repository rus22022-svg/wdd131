<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Cool Pics - A responsive photography gallery showcasing stunning places."
    />
    <meta name="author" content="Your Name" />
    <title>Cool Pics 📷</title>
    <link rel="stylesheet" href="coolpics.css" />
    <script src="coolpics.js" defer></script>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <h1>Cool Pics 📷</h1>

        <button
          id="menu-btn"
          class="menu-btn"
          aria-label="Toggle navigation"
          aria-expanded="false"
        >
          Menu
        </button>

        <nav id="main-nav" class="main-nav">
          <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">People</a></li>
            <li><a href="#">Places</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <h2 class="section-title">Current Work</h2>

      <div class="gallery">
        <img
          src="https://picsum.photos/seed/geo1/600/600"
          alt="Geothermal spring landscape"
        />
        <img
          src="https://picsum.photos/seed/geo2/600/600"
          alt="Geyser erupting in a field"
        />
        <img
          src="https://picsum.photos/seed/geo3/600/600"
          alt="Hot spring pool with vivid colors"
        />
        <img
          src="https://picsum.photos/seed/geo4/600/600"
          alt="Steam rising from volcanic vents"
        />
        <img
          src="https://picsum.photos/seed/geo5/600/600"
          alt="Mineral terraces at a hot spring"
        />
        <img
          src="https://picsum.photos/seed/geo6/600/600"
          alt="Aerial view of colorful geothermal pools"
        />
        <img
          src="https://picsum.photos/seed/geo7/600/600"
          alt="Mountains reflected in a clear lake"
        />
        <img
          src="https://picsum.photos/seed/geo8/600/600"
          alt="Snowy peaks above a geothermal basin"
        />
        <img
          src="https://picsum.photos/seed/geo9/600/600"
          alt="Sunset over steaming thermal waters"
        />
      </div>
    </main>

    <footer>
      <p>&copy;2025 Not a real site 😊</p>
    </footer>

    <div
      id="modal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-hidden="true"
      aria-label="Image viewer"
    >
      <div class="modal-card">
        <button
          id="modal-close"
          class="modal-close"
          aria-label="Close image viewer"
        >
          &times;
        </button>
        <img id="modal-img" src="" alt="" />
        <p id="modal-caption" class="modal-caption"></p>
      </div>
    </div>
  </body>
</html>
