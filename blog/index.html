<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kids Read For Fun</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
      integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Kids Read For Fun</h1>
      <nav aria-label="Main Menu">
        <ul class="main-nav">
          <li><a href="#">About</a></li>
          <li><a href="#">Archive</a></li>
          <li><a href="#">Search</a></li>
        </ul>
      </nav>
    </header>

    <main id="main-content" role="main">
      <section id="book-list" aria-label="Book Reviews">
        <article class="book">
          <div class="book-meta">
            <div class="date">July 5, 2022</div>
            <div>10-14</div>
            <div>Fantasy</div>
            <div class="stars" aria-label="4 out of 5 stars">★★★★</div>
          </div>
          <div class="book-content">
            <h2>Septimus Heap Book One: Magyk</h2>
            <img
              src="https://upload.wikimedia.org/wikipedia/en/5/5f/Magkycover2.jpg"
              alt="Cover of Septimus Heap Book One: Magyk by Angie Sage"
            />
            <p>
              If you enjoy stories about seventh sons of seventh sons and magyk
              this is the book for you.
            </p>
          </div>
        </article>
      </section>
    </main>

    <footer>Kalob Rust</footer>
  </body>
</html>
